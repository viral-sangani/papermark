# Production stack for Papermark on the Cesto server.
#
# Runs the app + its own isolated Postgres / MinIO / Redis(SRH) on a dedicated
# network so it never collides with the other services on this host.
#
# The app is published on host port 3100; the host's existing nginx
# (signal-nginx) reverse-proxies dataroom.cesto.co -> 127.0.0.1:3100 with TLS.
#
# Usage on server:
#   cd /opt/papermark
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Env comes from .env.production (see that file).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined at build time; pass them through from the env
      # file so `next build` produces correct public URLs/hosts.
      args:
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        NEXT_PUBLIC_MARKETING_URL: ${NEXT_PUBLIC_MARKETING_URL}
        NEXT_PUBLIC_APP_BASE_HOST: ${NEXT_PUBLIC_APP_BASE_HOST}
        NEXT_PUBLIC_WEBHOOK_BASE_URL: ${NEXT_PUBLIC_WEBHOOK_BASE_URL}
        NEXT_PUBLIC_WEBHOOK_BASE_HOST: ${NEXT_PUBLIC_WEBHOOK_BASE_HOST}
        NEXT_PUBLIC_UPLOAD_TRANSPORT: ${NEXT_PUBLIC_UPLOAD_TRANSPORT}
    container_name: papermark-app
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "127.0.0.1:3100:3000" # only localhost; nginx fronts it
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      srh:
        condition: service_started
    # Apply DB migrations on boot, then start.
    command: >
      sh -c "pnpm prisma migrate deploy && pnpm start -- -H 0.0.0.0 -p 3000"

  postgres:
    image: postgres:16-alpine
    container_name: papermark-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: papermark
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: papermark
    volumes:
      - papermark-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papermark -d papermark"]
      interval: 5s
      timeout: 5s
      retries: 15

  minio:
    image: minio/minio:latest
    container_name: papermark-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    ports:
      # Published so the app's signed object URLs (served via nginx -> here, or
      # direct) are reachable; bound to localhost, nginx can expose if needed.
      - "127.0.0.1:9100:9000"
      - "127.0.0.1:9101:9001"
    volumes:
      - papermark-prod-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 15

  minio-setup:
    image: minio/mc:latest
    container_name: papermark-prod-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    # Buckets stay PRIVATE. Browsers reach objects only through presigned URLs
    # the app generates (and the app fixes endpoint/forcePathStyle for MinIO).
    # No `mc anonymous set download` — that would expose all documents publicly.
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:?} ${MINIO_ROOT_PASSWORD:?} &&
      mc mb --ignore-existing local/papermark &&
      mc mb --ignore-existing local/papermark-archive &&
      echo 'MinIO buckets ready (private)';
      "

  redis:
    image: redis:7-alpine
    container_name: papermark-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - papermark-prod-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 15

  srh:
    image: hiett/serverless-redis-http:latest
    container_name: papermark-prod-srh
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_MODE: env
      SRH_TOKEN: ${SRH_TOKEN:?SRH_TOKEN required}
      SRH_CONNECTION_STRING: "redis://redis:6379"

volumes:
  papermark-prod-postgres:
  papermark-prod-minio:
  papermark-prod-redis:
