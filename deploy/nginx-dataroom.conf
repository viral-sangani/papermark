# dataroom.cesto.co  -> papermark-app:3000      (the app)
# s3.dataroom.cesto.co -> papermark-prod-minio:9000  (object storage / signed file URLs)
#
# Install into the existing signal-nginx at:
#   /opt/signal/infra/nginx/conf.d/dataroom.conf
# signal-nginx must be connected to the papermark_default network so it can
# resolve papermark-app / papermark-prod-minio by name:
#   docker network connect papermark_default signal-nginx
#
# The 443 blocks at the bottom require certs at
# /etc/letsencrypt/live/dataroom.cesto.co/ and /etc/letsencrypt/live/s3.dataroom.cesto.co/
# Issue them with certbot (webroot /var/www/certbot) AFTER DNS resolves, then
# reload nginx. Until then only the :80 ACME/redirect blocks are active.

# ---------- app: HTTP (ACME + redirect) ----------
server {
    listen 80;
    listen [::]:80;
    server_name dataroom.cesto.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- s3: HTTP (ACME + redirect) ----------
server {
    listen 80;
    listen [::]:80;
    server_name s3.dataroom.cesto.co;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- app: HTTPS ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dataroom.cesto.co;

    ssl_certificate     /etc/letsencrypt/live/dataroom.cesto.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dataroom.cesto.co/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Document uploads can be large.
    client_max_body_size 1024m;

    location / {
        proxy_pass         http://papermark-app:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ---------- s3 (MinIO): HTTPS ----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name s3.dataroom.cesto.co;

    ssl_certificate     /etc/letsencrypt/live/s3.dataroom.cesto.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/s3.dataroom.cesto.co/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Allow large object PUT/GET.
    client_max_body_size 1024m;
    # Don't buffer large object bodies through nginx.
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass         http://papermark-prod-minio:9000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }
}
